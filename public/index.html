<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cloud Resource Utilization</title>
</head>
<body>
  <h1>Cloud Resource Utilization Manager</h1>

  <input id="search" placeholder="Search by name" />
  <button id="load">Load</button>

  <form id="form">
    <input id="id" type="number" placeholder="id" required />
    <input id="name" placeholder="name" required />
    <input id="cpu" type="number" min="0" max="100" placeholder="cpu %" required />
    <input id="memory" type="number" min="0" max="100" placeholder="memory %" required />
    <input id="storage" type="number" min="0" placeholder="storage gb" required />
    <input id="billing" type="number" min="0" placeholder="billing" required />
    <button type="submit">Save</button>
  </form>

  <p id="msg"></p>
  <table border="1" id="table"></table>

  <script src="app.js"></script>
</body>
</html>
