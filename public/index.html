<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cloud Resource Dashboard</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

h1 {
  text-align:center;
}

.cards {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:8px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,.4);
}

.card h2 {
  margin:5px 0;
  color:#38bdf8;
}

input, button {
  padding:8px;
  margin:5px;
  border-radius:4px;
  border:none;
}

button {
  background:#38bdf8;
  color:black;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#1e293b;
}

th, td {
  padding:10px;
  border:1px solid #334155;
  text-align:center;
}

th {
  background:#0284c7;
}

form {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>☁ Cloud Resource Utilization Dashboard</h1>

<!-- DASHBOARD CARDS -->
<div class="cards">
  <div class="card">
    <p>Total Resources</p>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <p>Avg CPU %</p>
    <h2 id="avgCpu">0</h2>
  </div>

  <div class="card">
    <p>Avg Memory %</p>
    <h2 id="avgMemory">0</h2>
  </div>

  <div class="card">
    <p>Total Billing (€)</p>
    <h2 id="totalBilling">0</h2>
  </div>
</div>

<input id="search" placeholder="Search resource"/>
<button id="load">Load</button>

<table id="table"></table>

<form id="form">
  <input id="id" type="number" placeholder="id" required />
  <input id="name" placeholder="name" required />
  <input id="cpu" type="number" placeholder="cpu %" required />
  <input id="memory" type="number" placeholder="memory %" required />
  <input id="storage" type="number" placeholder="storage" required />
  <input id="billing" type="number" placeholder="billing" required />
  <button type="submit">Save</button>
</form>

<p id="msg"></p>

</div>

<script src="app.js"></script>
</body>
</html>
